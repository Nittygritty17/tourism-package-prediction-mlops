name: Tourism MLOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_DATASET_REPO_ID: nittygritty2106/travel-prediction-dataset
      HF_MODEL_REPO_ID: nittygritty2106/travelpredictionmlops
      HF_SPACE_REPO_ID: nittygritty2106/travelpredictionmlops-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training pipeline
        run: |
          python train.py

      - name: Deploy app to Hugging Face Space
        run: |
          python deploy_to_hf_space.py
