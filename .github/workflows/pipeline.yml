name: MLOps Pipeline

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Test HF Token
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        echo "HF_TOKEN available: ${{ secrets.HF_TOKEN != '' }}"
        pip install huggingface_hub
        python -c "import os; print('✅ Token detected:', bool(os.getenv('HF_TOKEN')))"
